version: '3'
services:
  frontend:
    build: ./frontend
    container_name: khongfamily_frontend
    ports:
      - "3000:3000"
    env_file:
      - .frontend.env
    depends_on:
      - backend
      # - reverse-proxy
  backend:
    build: ./backend
    container_name: khongfamily_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=database
    env_file:
      - .backend.env
    depends_on:
      - database
  database:
    image: postgres
    container_name: khongfamily_database
    env_file:
      - .backend.env
    volumes:
      - ./sqlscript/initUser.sql:/docker-entrypoint-initdb.d/initUser.sql
      - ./sqlscript/initTables.sql:/docker-entrypoint-initdb.d/initTables.sql
      - ./database:/var/lib/postgresql/data
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
